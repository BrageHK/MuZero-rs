# Network

network_type: Linear # Linear, ResNet
environment: CartPole # CartPole, TicTacToe, Othello

# Only for MLP
# This config learns CartPole in a few minutes on CPU only
linear:
    representation:
        latent_space_dims: 4
        fc_hidden_size: 8
        n_layers: 2
    dynamic:
        latent_space_dims: 4
        fc_hidden_size: 8
        n_layers: 2
    prediction:
        latent_space_dims: 4
        fc_hidden_size: 8
        n_layers: 2

# Only relevant when choosing ResNet above
resnet:
    obs_channels: 3
    channels: 32
    n_blocks: 4
    board_height: 8
    board_width: 8
    fc_hidden_size: 64

# Compute backends. Must be compiled in via cargo features (see crates/mz-train/Cargo.toml).
# Options: auto, cuda, rocm, metal, vulkan, wgpu, flex, ndarray, libtorch, libtorch-gpu
# auto = best compiled-in backend (cuda > metal > rocm > vulkan > wgpu > libtorch > flex > ndarray)
training_backend: ndarray
inference_backend: ndarray

# Training + algorithm
optimizer: AdamW # AdamW, Adam, Sgd
n_steps: 10
unroll_steps: 5
training_batch_size: 32
game_batch_size: 512
discount: 0.997
learning_rate: 0.001
train_ratio: 2
num_simulations: 35
inference_update_interval: 1000 # update inference network every N training steps
checkpoint_interval: 10000 # save network checkpoint to model/ every N environment steps
dirichlet_noise: 1
root_exploration_fraction: 0.25
total_steps: 1000000
avg_window: 100 # avg-reward plot averages over the last N finished games
rate_window_secs: 10 # env-steps/sec plot averages over the last N seconds

temperature_schedule:
    - step: 500000
      tau: 0.25
    - step: 750000
      tau: 0.25
    - step: null   # remaining steps
      tau: 0.25

# Parallel settings
max_thread_wait: 0.01
min_rayon_threads: 1

# Optional: checkpoint under model/ to init agent from (path w/o .mpk ext, e.g. "model/latest" or "model/best").
# null/omitted = fresh random init.
# NOTE: old checkpoints predate the Vec<Linear> refactor (param paths changed) and no longer load.
init_checkpoint: "model.bak/latest.mpk"