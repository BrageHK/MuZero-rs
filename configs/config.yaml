# Network

network_type: Linear # Linear, ResNet
environment: CartPole # CartPole, TicTacToe, Othello

# Only for MLP
representation:
    latent_space_dims: 8
    fc_hidden_size: 8
    n_layers: 2
dynamic:
    latent_space_dims: 8
    fc_hidden_size: 8
    n_layers: 2
prediction:
    latent_space_dims: 8
    fc_hidden_size: 8
    n_layers: 2

# Only relevant when choosing ResNet above
resnet:
    obs_channels: 3
    channels: 32
    n_blocks: 4
    board_height: 8
    board_width: 8
    fc_hidden_size: 64

# Compute backends. Must be compiled in via cargo features (see crates/mz-train/Cargo.toml).
# Options: auto, cuda, rocm, metal, vulkan, wgpu, flex, ndarray, libtorch, libtorch-gpu
# auto = best compiled-in backend (cuda > metal > rocm > vulkan > wgpu > libtorch > flex > ndarray)
training_backend: wgpu
inference_backend: ndarray

# Environment
action_space: 2
obs_dim: 4 # TODO: image/2d support

# Training + algorithm
n_steps: 10
unroll_steps: 5
batch_size: 32
discount: 0.997
learning_rate: 0.001
num_simulations: 50
train_steps_per_game: 10
inference_update_interval: 25 # update inference network every N training steps
checkpoint_interval: 10000 # save network checkpoint to model/ every N environment steps
dirichlet_noise: 5
root_exploration_fraction: 0.25
total_steps: 1000000

temperature_schedule:
    - step: 500000
      tau: 0.5
    - step: 750000
      tau: 0.3
    - step: null   # remaining steps
      tau: 0.25

# Parallel settings
max_thread_wait: 0.5
num_search_threads: null # Defaults to available cores
init_batch_size: 32
rec_batch_size: 32

# Optional: checkpoint under model/ to init agent from (path w/o .mpk ext, e.g. "model/latest" or "model/best").
# null/omitted = fresh random init.
# NOTE: old checkpoints predate the Vec<Linear> refactor (param paths changed) and no longer load.
init_checkpoint: null