# Network

network_type: Linear # Linear, ResNet
environment: CartPole # CartPole, TicTacToe, Othello, Atari

# Only used when environment: Atari. Any variant of the ale::BundledRom enum
# (e.g. Breakout, Pong, SpaceInvaders, MsPacman, Seaquest). Obs is a 1x84x84
# grayscale frame, so pair Atari with network_type: ResNet and resnet.obs_channels: 1.
atari_game: Breakout

# Only for MLP
# This config learns CartPole in a few minutes on CPU only
linear:
    representation:
        latent_space_dims: 8
        fc_hidden_size: 8
        n_layers: 3
    dynamic:
        latent_space_dims: 8
        fc_hidden_size: 8
        n_layers: 3
    prediction:
        latent_space_dims: 8
        fc_hidden_size: 8
        n_layers: 3

# Only relevant when choosing ResNet above
resnet:
    obs_channels: 3
    channels: 32
    n_blocks: 4
    fc_hidden_size: 64

# Compute backends. Must be compiled in via cargo features (see crates/mz-train/Cargo.toml).
# Options: auto, cuda, rocm, metal, vulkan, wgpu, flex, ndarray, libtorch, libtorch-gpu
# auto = best compiled-in backend (cuda > metal > rocm > vulkan > wgpu > libtorch > flex > ndarray)
training_backend: ndarray # wgpu
inference_backend: ndarray # ndarray

# Training + algorithm
n_steps: 5
unroll_steps: 5

# Batch sizes
training_batch_size: 32
game_batch_size: 4096

# Optimizer
optimizer: Sgd # AdamW, Adam, Sgd
discount: 0.997
learning_rate: 0.001
grad_clip: 5.0
weight_decay: 1e-4
momentum: 0.9

train_ratio: 2
num_simulations: 35

# Categorical value/reward support. Heads predict a distribution over
# 2*support_size+1 bins under the invertible scaling transform (paper App. F).
support_size: 50

inference_update_interval: 1 # update inference network every N training steps
checkpoint_interval: 1000 # save network checkpoint to model/env_name every N training steps

# Exploration/Exploitation
dirichlet_alpha: 1
root_exploration_fraction: 0.25

# Plotting
avg_window: 100 # avg-reward plot averages over the last N finished games
rate_window_secs: 10 # env-steps/sec plot averages over the last N seconds

buffer_size: 1000000
training_steps: 10000000

# Reanalyze
reanalyze_fraction: 0.001          # max chance for the stalest samples; 0.0 disables
reanalyze_batch_size: 4096             # candidate entries sampled per training step

temperature_schedule:
    - step: 500000
      tau: 1.0
    - step: 750000
      tau: 0.5
    - step: null   # remaining steps
      tau: 0.25

# Parallel settings
rayon_min_chunk_len: 512

# Optional: checkpoint under model/ to init agent from (path w/o .mpk ext, e.g. "model/latest" or "model/best").
# null/omitted = fresh random init.
# NOTE: old checkpoints predate the Vec<Linear> refactor (param paths changed) and no longer load.
init_checkpoint: null