# Network

network_type: Linear # Linear, ...

representation:
    latent_space_dims: 8
    fc_hidden_size: 8
    n_layers: 3
dynamic:
    latent_space_dims: 8
    fc_hidden_size: 8
    n_layers: 3
prediction:
    latent_space_dims: 8
    fc_hidden_size: 8
    n_layers: 3
  
# Environment
action_space: 2
obs_dim: 4 # TODO: image/2d support

# Training + algorithm
n_steps: 10
unroll_steps: 5
batch_size: 32
discount: 0.997
learning_rate: 0.001
num_simulations: 50
train_steps_per_game: 10
dirichlet_noise: 0.1
root_exploration_fraction: 0.25
total_steps: 1000000

temperature_schedule:
    - step: 500000
      tau: 1.0
    - step: 750000
      tau: 0.5
    - step: null   # remaining steps
      tau: 0.25