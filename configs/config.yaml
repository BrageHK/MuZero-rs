# Network

network_type: ResNet # Linear, ResNet
environment: TicTacToe # CartPole, TicTacToe, Othello

# Only for MLP
# This config learns CartPole in a few minutes on CPU only
linear:
    representation:
        latent_space_dims: 4
        fc_hidden_size: 8
        n_layers: 2
    dynamic:
        latent_space_dims: 4
        fc_hidden_size: 8
        n_layers: 2
    prediction:
        latent_space_dims: 4
        fc_hidden_size: 8
        n_layers: 2

# Only relevant when choosing ResNet above
resnet:
    obs_channels: 3
    channels: 32
    n_blocks: 4
    fc_hidden_size: 64

# Compute backends. Must be compiled in via cargo features (see crates/mz-train/Cargo.toml).
# Options: auto, cuda, rocm, metal, vulkan, wgpu, flex, ndarray, libtorch, libtorch-gpu
# auto = best compiled-in backend (cuda > metal > rocm > vulkan > wgpu > libtorch > flex > ndarray)
training_backend: ndarray # wgpu
inference_backend: ndarray # ndarray

# Training + algorithm
optimizer: AdamW # AdamW, Adam, Sgd
n_steps: 5
unroll_steps: 5
training_batch_size: 256
game_batch_size: 4096
discount: 0.997
learning_rate: 0.2
train_ratio: 10
num_simulations: 50
inference_update_interval: 100 # update inference network every N training steps
checkpoint_interval: 1000 # save network checkpoint to model/env_name every N training steps
dirichlet_noise: 1
root_exploration_fraction: 0.25
avg_window: 100 # avg-reward plot averages over the last N finished games
rate_window_secs: 10 # env-steps/sec plot averages over the last N seconds

buffer_size: 1e6
training_steps: 1e7

# Reanalyze
reanalyze_fraction: 0.15          # max chance for the stalest samples; 0.0 disables
reanalyze_staleness_steps: 50    # age (training steps) at which the chance saturates
reanalyze_pool: 4096             # candidate entries sampled per training step

temperature_schedule:
    - step: 500000
      tau: 1.0
    - step: 750000
      tau: 0.5
    - step: null   # remaining steps
      tau: 0.25

# Parallel settings
min_rayon_threads: 512

# Optional: checkpoint under model/ to init agent from (path w/o .mpk ext, e.g. "model/latest" or "model/best").
# null/omitted = fresh random init.
# NOTE: old checkpoints predate the Vec<Linear> refactor (param paths changed) and no longer load.
init_checkpoint: model/TicTacToe/latest.mpk